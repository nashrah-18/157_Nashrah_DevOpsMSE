<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial;
            background-color: lightgray;
            text-align: center;
            margin-top: 100px;
        }
        .login-box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 8px;
        }
        button {
            padding: 10px;
            background-color: pink;
            color: white;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Sign In</h2>
        <form>
            <input type="text" placeholder="Enter Username" required><br>
            <input type="password" placeholder="Enter Password" required><br>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
